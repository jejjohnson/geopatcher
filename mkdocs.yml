site_name: geopatcher
site_description: Four-axis Patcher framework for geospatial fields — split, operate, stitch.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/geopatcher
repo_name: jejjohnson/geopatcher

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - Concepts:
      - Patching: patching.md
      - Design decisions: decisions.md
  - Tutorials:
      - Patching intro: notebooks/patching_intro.ipynb
      - Patching samplers: notebooks/patching_sampling.ipynb
      - Patching geometries: notebooks/patching_geometries.ipynb
      - Patching backends: notebooks/patching_backends.ipynb
      - Patching time: notebooks/patching_time.ipynb
      - Patching streaming: notebooks/patching_streaming.ipynb
      - Catalog ↔ patching: notebooks/catalog_patching.ipynb
  - API Reference: api/reference.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
